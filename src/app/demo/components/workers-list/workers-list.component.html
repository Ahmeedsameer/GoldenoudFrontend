<div class="rounded-2xl border border-gray-200 bg-white pt-4 dark:border-white/[0.05] dark:bg-white/[0.03]">
  <!-- Header -->
  <div class="flex flex-col gap-2 px-5 mb-4 sm:flex-row sm:items-center sm:justify-between sm:px-6">
    <div class="flex items-center gap-3">
      <button (click)="onBack()" class="flex items-center gap-2 text-gray-600 hover:text-gray-800 dark:text-gray-400">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>
      <div>
        <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
          الموظفين
        </h3>
        <p class="text-sm text-gray-500">قائمة الموظفين</p>
      </div>
    </div>
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
      <app-button (btnClick)="onAddWorker()" size="sm">+ إضافة موظف</app-button>
      <div>
        <div class="relative">
          <button class="absolute top-1/2 left-4 -translate-y-1/2 text-gray-500" type="button">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </button>
          <input
            type="text"
            placeholder="ابحث..."
            class="h-[42px] w-full rounded-lg border border-gray-300 bg-transparent py-2.5 pl-11 pr-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 xl:w-[300px]"
            [value]="searchTerm"
            (input)="onSearchChange($event.target.value)"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="flex gap-2 border-b border-gray-200 px-5 py-2 dark:border-gray-800">
    <button
      (click)="setStatusFilter('all')"
      class="rounded-md px-3 py-1.5 text-sm font-medium transition"
      [ngClass]="{'bg-brand-50 text-brand-600': filterStatus === 'all', 'text-gray-500 hover:text-gray-700 dark:text-gray-400': filterStatus !== 'all'}">
      الكل
    </button>
    <button
      (click)="setStatusFilter('active')"
      class="rounded-md px-3 py-1.5 text-sm font-medium transition"
      [ngClass]="{'bg-success-50 text-success-600': filterStatus === 'active', 'text-gray-500 hover:text-gray-700 dark:text-gray-400': filterStatus !== 'active'}">
      النشط
    </button>
    <button
      (click)="setStatusFilter('inactive')"
      class="rounded-md px-3 py-1.5 text-sm font-medium transition"
      [ngClass]="{'bg-error-50 text-error-600': filterStatus === 'inactive', 'text-gray-500 hover:text-gray-700 dark:text-gray-400': filterStatus !== 'inactive'}">
      غير النشط
    </button>
  </div>

  <!-- Workers Grid -->
  <div class="p-5 sm:p-6">
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      @for (worker of filteredWorkers; track worker.id) {
        <div 
          (click)="onViewWorker(worker)"
          class="cursor-pointer rounded-xl border border-gray-200 bg-white p-4 transition hover:border-brand-300 hover:shadow-md dark:border-gray-800 dark:bg-white/[0.03]"
        >
          <!-- Avatar & Name -->
          <div class="mb-3 flex items-center gap-3">
            <div class="flex h-12 w-12 items-center justify-center rounded-full bg-brand-100 text-brand-600 dark:bg-brand-900/30">
              <span class="text-lg font-medium">{{ worker.name.charAt(0) }}</span>
            </div>
            <div>
              <h4 class="font-medium text-gray-800 dark:text-white/90">{{ worker.name }}</h4>
              <p class="text-sm text-gray-500">{{ worker.role }}</p>
            </div>
          </div>

          <!-- Info -->
          <div class="space-y-2 text-sm">
            <div class="flex items-center justify-between">
              <span class="text-gray-500">الهاتف:</span>
              <span class="text-gray-800 dark:text-white/90">{{ worker.phone }}</span>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-gray-500">الراتب:</span>
              <span class="font-medium text-gray-800 dark:text-white/90">{{ formatCurrency(worker.salary) }}</span>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-gray-500">تاريخ التعيين:</span>
              <span class="text-gray-800 dark:text-white/90">{{ worker.joinDate }}</span>
            </div>
          </div>

          <!-- Status -->
          <div class="mt-3 pt-3 border-t border-gray-100 dark:border-gray-800">
            <!-- <app-badge [color]="getStatusClass(worker.status)">
              {{ getStatusLabel(worker.status) }}
            </app-badge> -->
          </div>
        </div>
      }
    </div>
  </div>
</div>
