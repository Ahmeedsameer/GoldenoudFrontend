<header
  class="sticky top-0 z-[9999] flex items-center w-full transition-colors duration-200"
  style="
    height: var(--header-height);
    background-color: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  "
>
  <div class="flex items-center w-full gap-3 px-4 xl:px-5">

    <!-- ── Sidebar toggle ────────────────────────────── -->
    <button
      type="button"
      (click)="handleToggle()"
      aria-label="Toggle sidebar"
      class="header-icon-btn shrink-0"
    >
      @if (isMobileOpen$ | async) {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      }
    </button>

    <!-- ── Mobile brand ──────────────────────────────── -->
    <a routerLink="/" class="xl:hidden flex items-center gap-2">
      <span
        class="flex items-center justify-center w-8 h-8 rounded-lg text-[10px] font-bold"
        style="
          background: linear-gradient(135deg, #9c7820 0%, #c9a84c 35%, #f0d070 60%, #c9a84c 80%, #9c7820 100%);
          color: #0c0900;
          box-shadow: 0 2px 8px rgba(201,168,76,0.35);
        "
      >AB</span>
    </a>

    <!-- ── Search bar ─────────────────────────────────── -->
    <div class="hidden xl:flex flex-1 max-w-sm">
      <div class="relative w-full">
        <span
          class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"
          style="color: rgba(255,255,255,0.3);"
        >
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M3.04 9.37a6.33 6.33 0 1 1 12.67 0 6.33 6.33 0 0 1-12.67 0ZM9.37 1.54a7.83 7.83 0 1 0 4.99 13.88l2.82 2.82a.75.75 0 0 0 1.06-1.06l-2.82-2.82A7.83 7.83 0 0 0 9.37 1.54Z"
              fill="currentColor"/>
          </svg>
        </span>
        <input
          #searchInput
          type="text"
          placeholder="بحث سريع..."
          class="header-search-input"
        />
        <kbd
          class="absolute right-3 top-1/2 -translate-y-1/2 hidden sm:flex items-center gap-0.5 text-[10px] select-none rounded-md px-1.5 py-0.5"
          style="
            color: rgba(201,168,76,0.55);
            border: 1px solid rgba(201,168,76,0.18);
            background: rgba(201,168,76,0.05);
          "
        >
          <span>⌘</span><span>K</span>
        </kbd>
      </div>
    </div>

    <!-- ── Spacer ─────────────────────────────────────── -->
    <div class="flex-1 xl:hidden"></div>

    <!-- ── Actions ───────────────────────────────────── -->
    <div class="flex items-center gap-1.5">

      <!-- Mobile search toggle -->
      <button
        type="button"
        (click)="toggleApplicationMenu()"
        aria-label="Search"
        class="header-icon-btn xl:hidden"
      >
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M3.04 9.37a6.33 6.33 0 1 1 12.67 0 6.33 6.33 0 0 1-12.67 0ZM9.37 1.54a7.83 7.83 0 1 0 4.99 13.88l2.82 2.82a.75.75 0 0 0 1.06-1.06l-2.82-2.82A7.83 7.83 0 0 0 9.37 1.54Z"
            fill="currentColor"/>
        </svg>
      </button>

      <!-- Divider -->
      <div
        class="hidden xl:block w-px h-5 mx-0.5"
        style="background: rgba(201,168,76,0.18);"
      ></div>

      <!-- Theme toggle -->
      <app-theme-toggle-button />

      <!-- Notifications -->
      <app-notification-dropdown />

      <!-- Divider -->
      <div
        class="w-px h-5 mx-0.5"
        style="background: rgba(201,168,76,0.18);"
      ></div>

      <!-- User dropdown -->
      <app-user-dropdown />

    </div>
  </div>
</header>

<!-- Mobile search drawer -->
@if (isApplicationMenuOpen) {
  <div
    class="xl:hidden w-full px-4 py-3"
    style="
      background-color: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
    "
  >
    <div class="relative w-full">
      <span
        class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"
        style="color: rgba(255,255,255,0.3);"
      >
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M3.04 9.37a6.33 6.33 0 1 1 12.67 0 6.33 6.33 0 0 1-12.67 0ZM9.37 1.54a7.83 7.83 0 1 0 4.99 13.88l2.82 2.82a.75.75 0 0 0 1.06-1.06l-2.82-2.82A7.83 7.83 0 0 0 9.37 1.54Z"
            fill="currentColor"/>
        </svg>
      </span>
      <input
        type="text"
        placeholder="بحث سريع..."
        class="header-search-input"
      />
    </div>
  </div>
}
