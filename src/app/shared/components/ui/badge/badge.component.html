<span [ngClass]="[baseStyles, sizeClass, colorStyles].join(' ')">
  @if (startIcon) {
    <span class="flex items-center shrink-0" [innerHTML]="startIcon | safeHtml"></span>
  }
  <ng-content></ng-content>
  @if (endIcon) {
    <span class="flex items-center shrink-0" [innerHTML]="endIcon | safeHtml"></span>
  }
</span>
