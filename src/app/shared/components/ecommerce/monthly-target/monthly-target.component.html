<div class="ds-card overflow-hidden h-full">

  <!-- Header -->
  <div class="px-5 pt-5 sm:px-6 sm:pt-6 pb-0">
    <div class="flex items-start justify-between">
      <div>
        <h3 class="dash-chart-title">الهدف الشهري</h3>
        <p class="dash-chart-sub">تتبع أداء المبيعات</p>
      </div>
      <span
        class="inline-flex items-center gap-1 text-xs font-semibold rounded-full px-2.5 py-1"
        style="background: rgba(74,222,128,0.12); color: #4ade80;"
      >
        <svg width="8" height="8" viewBox="0 0 24 24" fill="none">
          <path d="M5 10l7-7m0 0l7 7m-7-7v18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        +10%
      </span>
    </div>
  </div>

  <!-- Radial Chart -->
  <div class="relative px-2">
    <div class="max-h-[330px]" id="chartDarkStyle">
      <apx-chart
        [series]="series"
        [chart]="chart"
        [plotOptions]="plotOptions"
        [fill]="fill"
        [stroke]="stroke"
        [labels]="labels"
        [colors]="colors"
      ></apx-chart>
    </div>
  </div>

  <!-- Motivational text -->
  <p
    class="text-center text-sm mx-auto px-5 -mt-4 pb-4 max-w-xs"
    style="color: rgba(255,255,255,0.38);"
  >
    أداؤك اليوم أعلى من الشهر الماضي
  </p>

  <!-- Bottom Stats -->
  <div
    class="flex items-center justify-around px-4 py-4 mt-1"
    style="border-top: 1px solid rgba(201,168,76,0.10);"
  >

    <!-- Target -->
    <div class="text-center">
      <p class="text-xs mb-1.5" style="color: rgba(255,255,255,0.38);">الهدف</p>
      <p
        class="flex items-center justify-center gap-1 text-base font-bold"
        style="color: rgba(255,255,255,0.88);"
      >
        $20K
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M7.26816 13.6632C7.4056 13.8192 7.60686 13.9176 7.8311 13.9176C7.83148 13.9176 7.83187 13.9176 7.83226 13.9176C8.02445 13.9178 8.21671 13.8447 8.36339 13.6981L12.3635 9.70076C12.6565 9.40797 12.6567 8.9331 12.3639 8.6401C12.0711 8.34711 11.5962 8.34694 11.3032 8.63973L8.5811 11.36L8.5811 2.5C8.5811 2.08579 8.24531 1.75 7.8311 1.75C7.41688 1.75 7.0811 2.08579 7.0811 2.5L7.0811 11.3556L4.36354 8.63975C4.07055 8.34695 3.59568 8.3471 3.30288 8.64009C3.01008 8.93307 3.01023 9.40794 3.30321 9.70075L7.26816 13.6632Z" fill="#f87171"/>
        </svg>
      </p>
    </div>

    <div class="w-px h-8" style="background: rgba(201,168,76,0.15);"></div>

    <!-- Revenue -->
    <div class="text-center">
      <p class="text-xs mb-1.5" style="color: rgba(255,255,255,0.38);">الإيرادات</p>
      <p
        class="flex items-center justify-center gap-1 text-base font-bold"
        style="color: rgba(255,255,255,0.88);"
      >
        $20K
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M7.60141 2.33683C7.73885 2.18084 7.9401 2.08243 8.16435 2.08243C8.16475 2.08243 8.16516 2.08243 8.16556 2.08243C8.35773 2.08219 8.54998 2.15535 8.69664 2.30191L12.6968 6.29924C12.9898 6.59203 12.9899 7.0669 12.6971 7.3599C12.4044 7.6529 11.9295 7.65306 11.6365 7.36027L8.91435 4.64004L8.91435 13.5C8.91435 13.9142 8.57856 14.25 8.16435 14.25C7.75013 14.25 7.41435 13.9142 7.41435 13.5L7.41435 4.64442L4.69679 7.36025C4.4038 7.65305 3.92893 7.6529 3.63613 7.35992C3.34333 7.06693 3.34348 6.59206 3.63646 6.29926L7.60141 2.33683Z" fill="#4ade80"/>
        </svg>
      </p>
    </div>

    <div class="w-px h-8" style="background: rgba(201,168,76,0.15);"></div>

    <!-- Today -->
    <div class="text-center">
      <p class="text-xs mb-1.5" style="color: rgba(255,255,255,0.38);">اليوم</p>
      <p
        class="flex items-center justify-center gap-1 text-base font-bold"
        style="color: rgba(255,255,255,0.88);"
      >
        $20K
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M7.60141 2.33683C7.73885 2.18084 7.9401 2.08243 8.16435 2.08243C8.16475 2.08243 8.16516 2.08243 8.16556 2.08243C8.35773 2.08219 8.54998 2.15535 8.69664 2.30191L12.6968 6.29924C12.9898 6.59203 12.9899 7.0669 12.6971 7.3599C12.4044 7.6529 11.9295 7.65306 11.6365 7.36027L8.91435 4.64004L8.91435 13.5C8.91435 13.9142 8.57856 14.25 8.16435 14.25C7.75013 14.25 7.41435 13.9142 7.41435 13.5L7.41435 4.64442L4.69679 7.36025C4.4038 7.65305 3.92893 7.6529 3.63613 7.35992C3.34333 7.06693 3.34348 6.59206 3.63646 6.29926L7.60141 2.33683Z" fill="#4ade80"/>
        </svg>
      </p>
    </div>

  </div>
</div>
