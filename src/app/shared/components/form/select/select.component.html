<div class="relative">
  <select
    [ngClass]="'lux-select ' + className"
    [value]="value"
    (change)="onChange($event)"
  >
    <!-- Placeholder option -->
    <option
      value=""
      [selected]="!value"
      style="background: #111; color: rgba(255,255,255,0.42);"
    >
      {{ placeholder }}
    </option>

    <!-- Options -->
    @for (option of options; track $index) {
      <option
        [value]="option.value"
        style="background: #111; color: rgba(255,255,255,0.82);"
      >
        {{ option.label }}
      </option>
    }
  </select>

  <!-- Chevron icon -->
  <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 7.5L10 12.5L15 7.5" stroke="rgba(201,168,76,0.55)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
</div>
