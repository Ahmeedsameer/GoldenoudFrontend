<div class="db-card h-full">

  <!-- Card Header -->
  <div class="db-card-head">
    <div>
      <h3 class="db-card-title">المبيعات الشهرية</h3>
      <p class="db-card-sub">أداء المبيعات لهذا العام</p>
    </div>

    <!-- Badge -->
    <div
      class="flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium"
      style="background: #FEF9E7; color: #9A7B1A; border: 1px solid rgba(212,175,55,0.22); font-family: 'Inter', system-ui, sans-serif;"
    >
      <span
        style="width:7px;height:7px;border-radius:50%;background:#D4AF37;display:inline-block;flex-shrink:0;">
      </span>
      المبيعات ٢٠٢٦
    </div>
  </div>

  <!-- Chart -->
  <div class="db-card-body overflow-x-auto no-scrollbar">
    <div class="-ml-3 min-w-[400px] xl:min-w-full">
      <apx-chart
        [series]="series"
        [chart]="chart"
        [xaxis]="xaxis"
        [plotOptions]="plotOptions"
        [dataLabels]="dataLabels"
        [stroke]="stroke"
        [legend]="legend"
        [yaxis]="yaxis"
        [grid]="grid"
        [fill]="fill"
        [tooltip]="tooltip"
        [colors]="colors"
      ></apx-chart>
    </div>
  </div>

</div>
