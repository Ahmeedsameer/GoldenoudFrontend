<div class="crud-form-card {{ className }}">

  <!-- Card header -->
  <div class="crud-form-header">
    <h3 class="crud-form-title">{{ title }}</h3>
    @if (desc) {
      <p class="crud-form-sub">{{ desc }}</p>
    }
  </div>

  <!-- Card body -->
  <div class="crud-form-body">
    <ng-content></ng-content>
  </div>

</div>
