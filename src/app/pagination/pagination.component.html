@if (paginationResult && paginationResult.links.length > 0) {
  <div class="px-5 py-3" style="border-top: 1px solid rgba(201,168,76,0.10);">
    <div class="flex items-center justify-between gap-3">

      <!-- Previous button -->
      <button
        class="lux-page-btn"
        [disabled]="!paginationResult.links[0]?.url"
        [class.opacity-30]="!paginationResult.links[0]?.url"
        [class.cursor-not-allowed]="!paginationResult.links[0]?.url"
        (click)="goToPage(paginationResult.links[0]?.page)"
      >
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M2.58301 9.99868C2.58272 10.1909 2.65588 10.3833 2.80249 10.53L7.79915 15.5301C8.09194 15.8231 8.56682 15.8233 8.85981 15.5305C9.15281 15.2377 9.15297 14.7629 8.86018 14.4699L5.14009 10.7472L16.6675 10.7472C17.0817 10.7472 17.4175 10.4114 17.4175 9.99715C17.4175 9.58294 17.0817 9.24715 16.6675 9.24715L5.14554 9.24715L8.86017 5.53016C9.15297 5.23717 9.15282 4.7623 8.85983 4.4695C8.56684 4.1767 8.09197 4.17685 7.79917 4.46984L2.84167 9.43049C2.68321 9.568 2.58301 9.77087 2.58301 9.99715C2.58301 9.99766 2.58301 9.99817 2.58301 9.99868Z" fill="currentColor"/>
        </svg>
        <span class="hidden sm:inline text-xs">السابق</span>
      </button>

      <!-- Mobile: page indicator -->
      <span class="sm:hidden text-xs" style="color: rgba(255,255,255,0.42);">
        صفحة {{ paginationResult.currentPage }} من {{ paginationResult.totalPages }}
      </span>

      <!-- Page number buttons -->
      <nav class="lux-page-nav hidden sm:flex">
        @for (page of paginationResult.links; track $index; let idx = $index) {
          @if (idx !== 0 && idx !== paginationResult.links.length - 1) {
            <button
              class="lux-page-btn"
              [ngClass]="{ 'lux-page-btn-active': page.active }"
              (click)="goToPage(page.page)"
            >
              <span [innerHTML]="page.label"></span>
            </button>
          }
        }
      </nav>

      <!-- Next button -->
      <button
        class="lux-page-btn"
        [disabled]="!paginationResult.links[paginationResult.links.length - 1]?.url"
        [class.opacity-30]="!paginationResult.links[paginationResult.links.length - 1]?.url"
        [class.cursor-not-allowed]="!paginationResult.links[paginationResult.links.length - 1]?.url"
        (click)="goToPage(paginationResult.links[paginationResult.links.length - 1]?.page)"
      >
        <span class="hidden sm:inline text-xs">التالي</span>
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M17.4175 9.9986C17.4178 10.1909 17.3446 10.3832 17.198 10.53L12.2013 15.5301C11.9085 15.8231 11.4337 15.8233 11.1407 15.5305C10.8477 15.2377 10.8475 14.7629 11.1403 14.4699L14.8604 10.7472L3.33301 10.7472C2.91879 10.7472 2.58301 10.4114 2.58301 9.99715C2.58301 9.58294 2.91879 9.24715 3.33301 9.24715L14.8549 9.24715L11.1403 5.53016C10.8475 5.23717 10.8477 4.7623 11.1407 4.4695C11.4336 4.1767 11.9085 4.17685 12.2013 4.46984L17.1588 9.43049C17.3173 9.568 17.4175 9.77087 17.4175 9.99715C17.4175 9.99763 17.4175 9.99812 17.4175 9.9986Z" fill="currentColor"/>
        </svg>
      </button>

    </div>
  </div>
}
