<!-- ══════════════════════════════════════════════════════
     ALPHA BUSINESS — Analytics Dashboard
     ══════════════════════════════════════════════════════ -->

<div class="space-y-7">

  <!-- ── Page Header ────────────────────────────────────── -->
  <div class="flex items-start justify-between flex-wrap gap-4 pt-1">
    <div>
      <h1
        class="text-2xl font-bold tracking-tight"
        style="color: #111827; letter-spacing: -0.04em;"
      >لوحة التحكم</h1>
      <p
        class="text-sm mt-1"
        style="color: #6B7280;"
      >نظرة شاملة على أداء الأعمال والمبيعات</p>
    </div>

    <div class="flex items-center gap-2">
      <!-- Date chip -->
      <div class="db-date-chip">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/>
          <path d="M8 2v4M16 2v4M3 10h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        مايو ٢٠٢٦
      </div>
    </div>
  </div>

  <!-- ── KPI Metrics ─────────────────────────────────────── -->
  <app-ecommerce-metrics />

  <!-- ── Analytics Row: Area Chart + Target ─────────────── -->
  <div class="grid grid-cols-1 gap-5 xl:grid-cols-3">
    <div class="xl:col-span-2">
      <app-statics-chart />
    </div>
    <div class="xl:col-span-1">
      <app-monthly-target />
    </div>
  </div>

  <!-- ── Bottom Row: Monthly Sales + Recent Orders ──────── -->
  <div class="grid grid-cols-1 gap-5 xl:grid-cols-5">
    <div class="xl:col-span-2">
      <app-monthly-sales-chart />
    </div>
    <div class="xl:col-span-3">
      <app-recent-orders />
    </div>
  </div>

</div>
