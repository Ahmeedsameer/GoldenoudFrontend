<div class="ds-card overflow-hidden px-5 pt-5 pb-3 sm:px-6 sm:pt-6">

  <!-- Header -->
  <div class="flex items-start justify-between mb-5">
    <div>
      <h3 class="dash-chart-title">المبيعات الشهرية</h3>
      <p class="dash-chart-sub">أداء المبيعات عبر الأشهر</p>
    </div>
    <!-- Gold accent dot -->
    <div
      class="flex items-center gap-2 text-xs font-medium px-3 py-1.5 rounded-lg"
      style="background: rgba(201,168,76,0.10); color: rgba(232,210,109,0.8);"
    >
      <span class="w-2 h-2 rounded-full" style="background: #C9A84C; box-shadow: 0 0 6px rgba(201,168,76,0.7);"></span>
      المبيعات
    </div>
  </div>

  <!-- Chart -->
  <div class="max-w-full overflow-x-auto no-scrollbar">
    <div class="-ml-4 min-w-[600px] xl:min-w-full">
      <apx-chart
        [series]="series"
        [chart]="chart"
        [xaxis]="xaxis"
        [plotOptions]="plotOptions"
        [dataLabels]="dataLabels"
        [stroke]="stroke"
        [legend]="legend"
        [yaxis]="yaxis"
        [grid]="grid"
        [fill]="fill"
        [tooltip]="tooltip"
        [colors]="colors"
      ></apx-chart>
    </div>
  </div>
</div>
