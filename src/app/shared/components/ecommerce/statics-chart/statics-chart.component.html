<div class="db-card h-full">

  <!-- Card Header -->
  <div class="db-card-head">

    <div>
      <h3 class="db-card-title">إحصائيات الأداء</h3>
      <p class="db-card-sub">المبيعات والإيرادات على مدار العام</p>
    </div>

    <div class="flex items-center gap-3 flex-shrink-0">

      <!-- Legend -->
      <div class="hidden sm:flex items-center gap-4">
        <span class="db-legend-dot"
          style="--dot-color: #D4AF37;"
        >
          <span
            style="width:8px;height:8px;border-radius:50%;background:#D4AF37;display:inline-block;flex-shrink:0;">
          </span>
          المبيعات
        </span>
        <span class="db-legend-dot">
          <span
            style="width:8px;height:8px;border-radius:50%;background:#9A7B1A;opacity:0.7;display:inline-block;flex-shrink:0;">
          </span>
          الإيرادات
        </span>
      </div>

      <!-- Date picker -->
      <div class="relative">
        <input
          #datepicker
          class="h-8 rounded-lg pl-7 pr-3 text-xs font-medium focus:outline-none focus:ring-0 cursor-pointer"
          placeholder="تحديد الفترة"
          data-class="flatpickr-right"
          readonly="readonly"
          style="
            border: 1px solid #EDE9DF;
            background: #FAFAF8;
            color: #6B7280;
            min-width: 138px;
            font-family: 'Inter', system-ui, sans-serif;
          "
        />
        <span class="absolute left-2 top-1/2 -translate-y-1/2 pointer-events-none"
          style="color: #C9A432;">
          <svg width="12" height="12" viewBox="0 0 20 20" fill="none">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M6.67 1.54a.75.75 0 0 1 .75.75v.71h5v-.71a.75.75 0 1 1 1.5 0v.71H15.4a2.08 2.08 0 0 1 2.08 2.08v2.5v8.33a2.08 2.08 0 0 1-2.08 2.08H4.58a2.08 2.08 0 0 1-2.08-2.08V7.58V5.08a2.08 2.08 0 0 1 2.08-2.08h1.34v-.71a.75.75 0 0 1 .75-.75ZM6.67 4.5H4.58c-.3 0-.54.24-.54.54v1.75h11.92V5.04a.54.54 0 0 0-.54-.54H13.92H6.67Zm7.25 3.79H3.54v7.29c0 .3.24.54.54.54h11.84c.3 0 .54-.24.54-.54V8.29Z"
              fill="currentColor"/>
          </svg>
        </span>
      </div>

    </div>
  </div>

  <!-- Chart -->
  <div class="db-card-body overflow-x-auto no-scrollbar">
    <div class="min-w-[640px] xl:min-w-full">
      <apx-chart
        [series]="series"
        [chart]="chart"
        [colors]="colors"
        [stroke]="stroke"
        [fill]="fill"
        [markers]="markers"
        [grid]="grid"
        [dataLabels]="dataLabels"
        [tooltip]="tooltip"
        [xaxis]="xaxis"
        [yaxis]="yaxis"
        [legend]="legend"
      ></apx-chart>
    </div>
  </div>

</div>
