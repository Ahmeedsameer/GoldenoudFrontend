<div class="db-tbl-card">

  <!-- Card Header -->
  <div class="db-tbl-head">
    <div>
      <h3
        class="db-card-title"
        style="font-size: 0.9375rem;"
      >أحدث الطلبات</h3>
      <p class="db-card-sub">آخر 5 طلبات مسجلة في النظام</p>
    </div>
    <div class="flex items-center gap-2">
      <button class="db-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        فلتر
      </button>
      <button class="db-btn db-btn-primary">
        عرض الكل
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="db-tbl-wrap">
    <table class="db-tbl">
      <thead>
        <tr>
          <th>المنتج</th>
          <th class="hidden sm:table-cell">الفئة</th>
          <th class="hidden md:table-cell">السعر</th>
          <th>الحالة</th>
        </tr>
      </thead>
      <tbody>
        @for (product of tableData; track $index) {
          <tr>

            <!-- Product -->
            <td>
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 rounded-xl overflow-hidden flex-shrink-0"
                  style="border: 1px solid #EDE9DF;"
                >
                  <img
                    [src]="product.image"
                    [alt]="product.name"
                    class="w-10 h-10 object-cover"
                  />
                </div>
                <div class="min-w-0">
                  <p
                    class="text-sm font-semibold whitespace-nowrap"
                    style="color: #111827; letter-spacing: -0.01em;"
                  >{{ product.name }}</p>
                  <p
                    class="text-xs mt-0.5"
                    style="color: #9CA3AF;"
                  >{{ product.variants }}</p>
                </div>
              </div>
            </td>

            <!-- Category -->
            <td class="hidden sm:table-cell">
              <span
                class="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-medium"
                style="background: #F7F5EF; color: #6B7280; border: 1px solid #EDE9DF;"
              >{{ product.category }}</span>
            </td>

            <!-- Price -->
            <td class="hidden md:table-cell">
              <span
                class="text-sm font-700 tabular-nums"
                style="color: #9A7B1A; font-weight: 700; letter-spacing: -0.01em;"
              >{{ product.price }}</span>
            </td>

            <!-- Status -->
            <td>
              <app-badge size="sm" [color]="getBadgeColor(product.status)">
                {{ product.status }}
              </app-badge>
            </td>

          </tr>
        }
      </tbody>
    </table>
  </div>

</div>
