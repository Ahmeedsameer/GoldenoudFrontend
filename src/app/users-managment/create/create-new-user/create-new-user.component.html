<app-loading [loading]="loading"></app-loading>

<app-component-card
  title="إنشاء مستخدم جديد"
  desc="أدخل بيانات المستخدم الجديد في الحقول أدناه."
>

  @if (alert.show) {
    <app-alert [message]="alert.message"></app-alert>
  }

  <form [formGroup]="userForm">

    <!-- Full name -->
    <div>
      <app-label for="username">الاسم الكامل</app-label>
      <app-input-field
        [value]="userForm.get('name')?.value"
        [error]="!!(userForm.get('name')?.invalid && userForm.get('name')?.touched)"
        (valueChange)="userForm.get('name')?.setValue($event)"
        placeholder="مثال: أحمد محمد"
      />
      <app-form-error [control]="userForm.get('name')"></app-form-error>
    </div>

    <!-- Email -->
    <div>
      <app-label>البريد الإلكتروني</app-label>
      <app-input-field
        type="email"
        [value]="userForm.get('email')?.value"
        [error]="!!(userForm.get('email')?.invalid && userForm.get('email')?.touched)"
        (valueChange)="userForm.get('email')?.setValue($event)"
        placeholder="email@example.com"
      />
      <app-form-error [control]="userForm.get('email')"></app-form-error>
    </div>

    <!-- Phone -->
    <div>
      <app-label>رقم الهاتف</app-label>
      <app-input-field
        type="tel"
        [value]="userForm.get('phone')?.value"
        [error]="!!(userForm.get('phone')?.invalid && userForm.get('phone')?.touched)"
        (valueChange)="userForm.get('phone')?.setValue($event)"
        placeholder="مثال: 01012345678"
      />
      <app-form-error [control]="userForm.get('phone')"></app-form-error>
    </div>

    <!-- Role -->
    <div>
      <app-label>نوع المستخدم</app-label>
      <app-select
        [value]="userForm.get('role')?.value"
        (valueChange)="userForm.get('role')?.setValue($event)"
        [options]="userTypes"
        placeholder="اختر الدور"
      ></app-select>
      <app-form-error [control]="userForm.get('role')"></app-form-error>
      <p class="mt-1.5 text-[11px] text-gray-400 dark:text-gray-500">
        هذه الصفحة لإنشاء حسابات المدير العام (Admin) فقط. لإضافة مدير فرع أو بائع استخدم
        «الموارد البشرية ← الموظفون» لأن الموظف يحتاج فرعًا أساسيًا وراتبًا وعمولة وبيانات إجازات.
      </p>
    </div>

    <!-- Passwords -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <app-label>كلمة المرور</app-label>
        <app-input-field
          type="password"
          [value]="userForm.get('password')?.value"
          [error]="!!(userForm.get('password')?.invalid && userForm.get('password')?.touched)"
          (valueChange)="userForm.get('password')?.setValue($event)"
          placeholder="••••••••"
        />
        <app-form-error [control]="userForm.get('password')"></app-form-error>
      </div>
      <div>
        <app-label>تأكيد كلمة المرور</app-label>
        <app-input-field
          type="password"
          [value]="userForm.get('coPassword')?.value"
          [error]="!!(userForm.get('coPassword')?.invalid && userForm.get('coPassword')?.touched)"
          (valueChange)="userForm.get('coPassword')?.setValue($event)"
          placeholder="••••••••"
        />
        <app-form-error [control]="userForm.get('coPassword')"></app-form-error>
      </div>
    </div>

  </form>

  <!-- Submit -->
  <div class="flex gap-3">
    <app-button (btnClick)="onSubmit()" size="md">إنشاء المستخدم</app-button>
  </div>

</app-component-card>
