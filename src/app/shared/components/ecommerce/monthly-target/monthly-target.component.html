<div class="db-card h-full">

  <!-- Card Header -->
  <div class="db-card-head">
    <div>
      <h3 class="db-card-title">الهدف الشهري</h3>
      <p class="db-card-sub">مايو ٢٠٢٦ · تتبع الأداء</p>
    </div>
    <span class="db-kpi-up">
      <svg width="8" height="8" viewBox="0 0 24 24" fill="none">
        <path d="M5 10l7-7m0 0l7 7m-7-7v18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      +10%
    </span>
  </div>

  <!-- Radial Chart -->
  <div class="px-2" id="chartDarkStyle">
    <apx-chart
      [series]="series"
      [chart]="chart"
      [plotOptions]="plotOptions"
      [fill]="fill"
      [stroke]="stroke"
      [labels]="labels"
      [colors]="colors"
    ></apx-chart>
  </div>

  <!-- Caption -->
  <p
    class="text-center text-sm -mt-4 pb-3 px-4"
    style="color: #9CA3AF; font-family: 'Inter', system-ui, sans-serif;"
  >
    أداؤك أعلى من الشهر الماضي
  </p>

  <!-- Stats Row -->
  <div class="flex items-center justify-around px-4 pb-4 pt-1"
    style="border-top: 1px solid #F3F1EB;">

    <div class="db-stat-item">
      <p class="db-stat-lbl">الهدف</p>
      <p class="db-stat-val" style="display:flex;align-items:center;gap:4px;justify-content:center;">
        $20K
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M7.27 13.66L3.3 9.7C3.01 9.41 3.01 8.93 3.3 8.64C3.59 8.35 4.07 8.35 4.36 8.64L7.08 11.36V2.5C7.08 2.09 7.41 1.75 7.83 1.75C8.25 1.75 8.58 2.09 8.58 2.5V11.36L11.3 8.64C11.6 8.35 12.07 8.35 12.36 8.64C12.65 8.93 12.65 9.41 12.36 9.7L8.36 13.67C8.21 13.82 8.02 13.92 7.83 13.92C7.61 13.92 7.41 13.82 7.27 13.66Z"
            fill="#B91C1C"/>
        </svg>
      </p>
    </div>

    <div class="db-stat-divider"></div>

    <div class="db-stat-item">
      <p class="db-stat-lbl">الإيرادات</p>
      <p class="db-stat-val" style="display:flex;align-items:center;gap:4px;justify-content:center;">
        $20K
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M8.7 2.34L12.7 6.3C12.99 6.59 12.99 7.07 12.7 7.36C12.4 7.65 11.93 7.65 11.64 7.36L8.92 4.64V13.5C8.92 13.91 8.58 14.25 8.16 14.25C7.75 14.25 7.41 13.91 7.41 13.5V4.64L4.7 7.36C4.4 7.65 3.93 7.65 3.64 7.36C3.34 7.07 3.34 6.59 3.64 6.3L7.6 2.34C7.74 2.18 7.94 2.08 8.16 2.08C8.36 2.08 8.55 2.15 8.7 2.34Z"
            fill="#15803D"/>
        </svg>
      </p>
    </div>

    <div class="db-stat-divider"></div>

    <div class="db-stat-item">
      <p class="db-stat-lbl">اليوم</p>
      <p class="db-stat-val" style="display:flex;align-items:center;gap:4px;justify-content:center;">
        $20K
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M8.7 2.34L12.7 6.3C12.99 6.59 12.99 7.07 12.7 7.36C12.4 7.65 11.93 7.65 11.64 7.36L8.92 4.64V13.5C8.92 13.91 8.58 14.25 8.16 14.25C7.75 14.25 7.41 13.91 7.41 13.5V4.64L4.7 7.36C4.4 7.65 3.93 7.65 3.64 7.36C3.34 7.07 3.34 6.59 3.64 6.3L7.6 2.34C7.74 2.18 7.94 2.08 8.16 2.08C8.36 2.08 8.55 2.15 8.7 2.34Z"
            fill="#15803D"/>
        </svg>
      </p>
    </div>

  </div>

</div>
