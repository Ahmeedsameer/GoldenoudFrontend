<div class="rounded-2xl border border-gray-200 bg-white pt-4 dark:border-white/[0.05] dark:bg-white/[0.03]">
  <!-- Header -->
  <div class="px-5 py-4">
    <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
      تسجيل الدخول - {{ shopName }}
    </h3>
    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
      أدخل بيانات الدخول للوصول إلى النظام
    </p>
  </div>

  <!-- Form -->
  <form [formGroup]="loginForm" class="p-4 sm:p-6">
    @if (errorMessage) {
      <div class="mb-4 rounded-lg bg-red-50 p-3 text-sm text-red-600 dark:bg-red-900/20 dark:text-red-400">
        {{ errorMessage }}
      </div>
    }

    <div class="space-y-4">
      <div>
        <app-label for="username">اسم المستخدم</app-label>
        <app-input-field 
          [value]="loginForm.get('username')?.value" 
          [error]="!!(loginForm.get('username')?.invalid && loginForm.get('username')?.touched)" 
          (valueChange)="loginForm.get('username')?.setValue($event)" 
          placeholder="أدخل اسم المستخدم"
        />
        <app-form-error [control]="loginForm.get('username')"></app-form-error>
      </div>

      <div>
        <app-label for="password">كلمة المرور</app-label>
        <app-input-field 
          type="password"
          [value]="loginForm.get('password')?.value" 
          [error]="!!(loginForm.get('password')?.invalid && loginForm.get('password')?.touched)" 
          (valueChange)="loginForm.get('password')?.setValue($event)" 
          placeholder="أدخل كلمة المرور"
        />
        <app-form-error [control]="loginForm.get('password')"></app-form-error>
      </div>
    </div>

    <!-- Actions -->
    <div class="mt-6 flex gap-3">
      <app-button (btnClick)="onSubmit()" size="md">
        تسجيل الدخول
      </app-button>
      <app-button routerLink="/demo" size="md" variant="outline">
        رجوع
      </app-button>
    </div>

    <!-- Demo Hint -->
    <div class="mt-4 rounded-lg bg-gray-50 p-3 text-sm text-gray-500 dark:bg-gray-800 dark:text-gray-400">
      <p><strong>Demo:</strong> استخدم username: <code class="bg-gray-200 px-1 rounded dark:bg-gray-700">admin</code> و password: <code class="bg-gray-200 px-1 rounded dark:bg-gray-700">1234</code></p>
    </div>
  </form>
</div>
